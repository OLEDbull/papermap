services:
  - type: web
    name: papermap
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: AI_API_KEY
        sync: false  # 在 Render 控制台手动设置
      - key: ARXIV_MAX_RESULTS
        value: 100
      - key: S2_MAX_RESULTS
        value: 80